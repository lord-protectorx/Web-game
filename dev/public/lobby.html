<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Рынок малины - Лобби</title>
  <style>
    :root {
      --bg:#0b1220;
      --panel:#111a2c;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --border:rgba(255,255,255,.12);
      --accent:#22c55e;
      --accent-2:#38bdf8;
      --danger:#fca5a5;
      --shadow:0 18px 40px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial;
      background:
        radial-gradient(900px 500px at -15% 0%, #1e293b, transparent),
        radial-gradient(900px 600px at 120% 10%, #172554, transparent),
        var(--bg);
    }

    .panel {
      width: min(720px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .lead {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 14px;
      transition: .15s;
      background: rgba(255,255,255,.04);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .btn-create {
      background: linear-gradient(90deg, #15803d, var(--accent));
      border-color: rgba(34,197,94,.5);
    }

    .btn-join {
      background: linear-gradient(90deg, #0284c7, var(--accent-2));
      border-color: rgba(56,189,248,.5);
      min-width: 170px;
    }

    .input {
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      background: #0a1020;
      padding: 12px 14px;
      width: 100%;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: .8px;
    }

    .status {
      margin-top: 16px;
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error { color: var(--danger); }
    .status.success { color: #86efac; }

    .code {
      margin-top: 8px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Лобби</h1>
    <p class="lead">Создайте комнату и отправьте код сопернику, либо подключитесь по коду комнаты.</p>

    <div class="grid">
      <button id="createBtn" class="btn btn-create" type="button">Создать игру</button>

      <div class="row">
        <input
          id="roomInput"
          class="input"
          type="text"
          maxlength="6"
          placeholder="КОД КОМНАТЫ"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="joinBtn" class="btn btn-join" type="button">Подключиться</button>
      </div>
    </div>

    <div id="status" class="status">Подключение к серверу...</div>
    <div id="roomCode" class="code" aria-live="polite"></div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/lobby.js"></script>
</body>
</html>
